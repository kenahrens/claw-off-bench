apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  namespace: claw-bench
  labels:
    claw.agent: ${AGENT_NAME}
    claw.task: ${TASK_ID}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: claw-runner
        claw.agent: ${AGENT_NAME}
        claw.task: ${TASK_ID}
    spec:
      restartPolicy: Never
      containers:
        - name: agent
          image: ${AGENT_IMAGE}
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          command: ["${AGENT_BIN}", "${AGENT_ACTION}", "${TASK_INSTRUCTION}"]
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claw-secrets
                  key: llm_api_key
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claw-secrets
                  key: github_token
          resources:
            requests:
              cpu: "1"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: claw-workspace
        - name: tmp
          emptyDir: {}
