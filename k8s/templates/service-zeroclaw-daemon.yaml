apiVersion: v1
kind: Service
metadata:
  name: ${DAEMON_NAME}
  namespace: claw-bench
  labels:
    app: ${DAEMON_NAME}
    claw.agent: zeroclaw
    claw.mode: daemon
spec:
  selector:
    app: ${DAEMON_NAME}
  ports:
    - name: http
      port: ${DAEMON_PORT}
      targetPort: ${DAEMON_PORT}
      protocol: TCP
